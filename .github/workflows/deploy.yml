name: Build and Deploy

on:
  push:
    tags:
      - '*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_DIRECTORY: /var/lib/app/cmpe-272-project
  DEPLOY_TMP_DIRECTORY: /tmp/cmpe-272-project

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create VERSION file
        run: echo "${{ github.ref_name }}" > VERSION

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push PHP-FPM image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: php-fpm/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/php-fpm:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/php-fpm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: nginx/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/nginx:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose-prod.yml"
          target: ${{env.DEPLOY_TMP_DIRECTORY}}

      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Create app directory if missing
            mkdir -p ${{env.DEPLOY_DIRECTORY}}
            
            # Move uploaded file to central directory and rename to docker-compose.yml
            mv ${{env.DEPLOY_TMP_DIRECTORY}}/docker-compose-prod.yml ${{env.DEPLOY_DIRECTORY}}/docker-compose.yml

            cd ${{env.DEPLOY_DIRECTORY}}

            # Login to GHCR (using the installed docker-compose path if needed, 
            # though standard docker login works without it)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Set container variables
            export IMAGE_REGISTRY=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            export IMAGE_TAG=${{ github.ref_name }}
            export BUILD_TARGET=production
            export HTTP_PORT=${{ secrets.HTTP_PORT }}
            export DB_PORT=${{ secrets.DB_PORT }}
            # Set app variables
            export DB_USER=${{ secrets.DB_USER }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            # Pull and restart
            bash ./docker-compose pull
            bash ./docker-compose up -d
            bash ./docker-compose restart nginx

            # Run migrations
            bash ./docker-compose exec -T php-fpm vendor/bin/phinx migrate

            # Cleanup
            docker image prune -f
